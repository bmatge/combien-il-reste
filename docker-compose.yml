services:
  api:
    build:
      context: .
      target: api
    volumes:
      - ./data/prenoms.db:/app/data/prenoms.db:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    build:
      context: .
      target: frontend
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
